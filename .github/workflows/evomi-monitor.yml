name: Evomi Proxy Monitor

on:
  schedule:
    # GitHub Actions cron runs in UTC. Asia/Seoul = UTC+9.
    # Triggered 30 min early to absorb GitHub's up-to-1h scheduling delay.
    # The Slack message header is snapped to the nearest scheduled hour (7/11/15/21).
    #
    # Target KST → Trigger UTC (−30 min)
    #   07:00 KST → 21:30 UTC (prev day)
    #   11:00 KST → 01:30 UTC
    #   15:00 KST → 05:30 UTC
    #   21:00 KST → 11:30 UTC
    - cron: '30 21 * * *'
    - cron: '30 1 * * *'
    - cron: '30 5 * * *'
    - cron: '30 11 * * *'

  # Allow manual trigger from the GitHub Actions UI
  workflow_dispatch:

jobs:
  monitor:
    name: Run Evomi Monitor
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Restore the state file (previous balance snapshot) from cache.
      # restore-keys without a suffix always picks the most recent matching cache,
      # so we always get the snapshot from the previous run.
      - name: Restore state cache
        uses: actions/cache@v4.2.3
        with:
          path: data/state.json
          key: evomi-state-${{ github.run_id }}
          restore-keys: |
            evomi-state-

      - name: Run monitor
        env:
          EVOMI_API_KEY: ${{ secrets.EVOMI_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_MENTION_USER_ID: ${{ secrets.SLACK_MENTION_USER_ID }}
        run: npm run monitor
      # Note: actions/cache automatically saves the updated state.json
      # after the job completes (post-step), keyed by evomi-state-{run_id}.
